# ruff.toml — build-rite standard config
# Enforces br-clean-code.md rules where statically detectable.
# Copy to project root: cp .claude/templates/ruff.toml ruff.toml
# Adjust line-length, target-version, and per-file-ignores for your project.

line-length = 120
target-version = "py311"
indent-width = 4

[lint]
select = [
  # ── Naming ───────────────────────────────────────────────────────────────
  "N",        # pep8-naming: class/func/var/arg naming conventions

  # ── Functions ────────────────────────────────────────────────────────────
  "FBT",      # boolean-typed positional args and default values (flag params)
  "PLR0911",  # too many return statements
  "PLR0912",  # too many branches
  "PLR0913",  # too many arguments (>5)
  "PLR0915",  # too many statements
  "C901",     # McCabe complexity

  # ── Error handling ───────────────────────────────────────────────────────
  "BLE001",   # blind exception catch (bare `except:` or `except Exception`)
  "EM",       # exception messages must not be inline string literals
  "TRY",      # exception handling best practices (no broad raises, etc.)
  "PERF",     # performance anti-patterns

  # ── Dead code / clarity ──────────────────────────────────────────────────
  "ERA",      # commented-out code
  "F401",     # unused imports
  "F811",     # redefinition of unused name
  "F841",     # local variable assigned but never used
  "RUF100",   # unused noqa directives

  # ── Magic values ─────────────────────────────────────────────────────────
  "PLR2004",  # magic value used in comparison — use named constants

  # ── Simplification ───────────────────────────────────────────────────────
  "SIM",      # simplifiable conditions, redundant branches, unnecessary else
  "RET",      # return statement improvements (unnecessary else after return)
  "PIE",      # misc code improvements (unnecessary pass, prefer list comp, etc.)
  "UP",       # pyupgrade: modernise syntax (f-strings, type hints, etc.)
  "FURB",     # refurb: modernisation patterns

  # ── Security (br-clean-code: security hygiene) ───────────────────────────
  "S",        # bandit: SQL injection, hardcoded secrets, insecure calls, etc.

  # ── Imports ──────────────────────────────────────────────────────────────
  "I",        # isort: consistent import ordering
  "TCH",      # move type-only imports into TYPE_CHECKING block

  # ── Bug prevention ───────────────────────────────────────────────────────
  "B",        # flake8-bugbear: likely bugs and design issues
  "A",        # flake8-builtins: shadowing Python builtins
  "RUF",      # ruff-specific rules

  # ── Pyflakes + pycodestyle (standard Python quality) ────────────────────
  "F",        # pyflakes: undefined names, unused vars, import issues
  "E",        # pycodestyle errors: syntax, indentation, whitespace
  "W",        # pycodestyle warnings: whitespace, blank lines

  # ── Type annotations ─────────────────────────────────────────────────────
  "ANN",      # enforce type annotations on public API

  # ── Testing ──────────────────────────────────────────────────────────────
  "PT",       # flake8-pytest-style: consistent pytest patterns

  # ── Datetime safety ──────────────────────────────────────────────────────
  "DTZ",      # flake8-datetimez: always use timezone-aware datetimes

  # ── Print / logging ──────────────────────────────────────────────────────
  "T20",      # flake8-print: no print() in production code (use logging)

  # ── String formatting ────────────────────────────────────────────────────
  "ISC",      # implicit string concatenation (accidental multi-line strings)
  "Q",        # flake8-quotes: consistent quote style

  # ── Comprehensions ───────────────────────────────────────────────────────
  "C4",       # flake8-comprehensions: use list/dict/set comprehensions properly

  # ── Pathlib ──────────────────────────────────────────────────────────────
  "PTH",      # use pathlib instead of os.path

  # ── Argument clinic ──────────────────────────────────────────────────────
  "ARG",      # unused function/method/lambda arguments
]

ignore = [
  # ANN: skip `self` and `cls` annotation requirements
  "ANN101", "ANN102",
  # ANN: missing return type on `__init__` — always None, redundant
  "ANN204",
  # TRY003: overly strict — long messages in raise are fine
  "TRY003",
  # T201: allow print in scripts/CLIs — override per-file for libs
  "T201",
  # ISC001: conflicts with formatter
  "ISC001",
  # Q: handled by formatter
  "Q000", "Q001", "Q002", "Q003",
  # E501: line length handled by formatter, not linter
  "E501",
  # ARG001: unused `self` in abstract/protocol methods is intentional
  "ARG002",
]

# Allow auto-fix for safe rules only
fixable = ["I", "UP", "RET", "SIM", "RUF100", "ERA", "TCH", "PIE", "FURB", "C4", "PTH", "PT", "ISC", "E", "W"]
unfixable = ["F401"]  # don't auto-remove imports — might be re-exports

[lint.per-file-ignores]
"tests/**/*.py" = [
  "S101",     # assert is expected in tests
  "ANN",      # type annotations optional in tests
  "PLR2004",  # magic values acceptable in test assertions
  "FBT",      # boolean args fine in test helpers
]
"**/migrations/**" = [
  "N",        # naming not controlled in generated migrations
  "RUF",
]
"**/conftest.py" = ["ANN", "S101", "ARG"]
"**/settings*.py" = ["S105", "S106"]  # passwords in settings are env refs, not literals
"scripts/**/*.py" = ["T201"]          # print() fine in scripts
"**/cli.py" = ["T201"]

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 5           # PLR0913 — matches br-clean-code ≤3 ideal, 5 hard limit
max-branches = 10      # PLR0912
max-returns = 5        # PLR0911
max-statements = 40    # PLR0915

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Security", "fastapi.Query", "fastapi.Header"]

[lint.isort]
known-first-party = []  # add your package name(s) here
force-sort-within-sections = true
split-on-trailing-comma = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
